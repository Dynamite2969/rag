<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D House Massing Model</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at top, #b3d8ff 0%, #1b365b 80%);
            font-family: Inter, system-ui, sans-serif;
            color: #111;
        }

        #info {
            position: absolute;
            top: 18px;
            left: 18px;
            max-width: 320px;
            background: rgba(255, 255, 255, 0.92);
            padding: 18px 20px;
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
            font-size: 14px;
            line-height: 1.6;
            pointer-events: none;
        }

        #info h2 {
            margin: 0 0 10px;
            font-size: 18px;
            letter-spacing: 0.02em;
        }

        #info p {
            margin: 8px 0;
        }

        #info small {
            display: block;
            margin-top: 10px;
            color: #555;
        }
    </style>
</head>
<body>

<div id="info">
    <h2>3D Modern House View</h2>
    <p><b>Width:</b> 38 ft | <b>Depth:</b> 61 ft | <b>Height:</b> 30 ft</p>
    <p><b>Stories:</b> 3</p>
    <p><b>Style:</b> Contemporary massing with overhangs, balcony, and glass curtain walls.</p>
    <small>Rotate by dragging, zoom with scroll, pan with right-click.</small>
</div>

<!-- Load Three.js from CDN -->
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const width = 38;
    const depth = 61;
    const floorHeight = 9.5;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x7dc3f0);
    scene.fog = new THREE.Fog(0x7dc3f0, 120, 260);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(95, 55, 110);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.maxPolarAngle = Math.PI * 0.95;
    controls.target.set(0, 12, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.55));

    const sunLight = new THREE.DirectionalLight(0xffffff, 1.1);
    sunLight.position.set(65, 90, 50);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    sunLight.shadow.camera.left = -120;
    sunLight.shadow.camera.right = 120;
    sunLight.shadow.camera.top = 120;
    sunLight.shadow.camera.bottom = -120;
    scene.add(sunLight);

    const fillLight = new THREE.DirectionalLight(0xaaddff, 0.35);
    fillLight.position.set(-70, 45, -40);
    scene.add(fillLight);

    const groundMat = new THREE.MeshStandardMaterial({ color: 0x5c7d51, roughness: 0.95, metalness: 0.05 });
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(280, 220), groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grassMat = new THREE.MeshStandardMaterial({ color: 0x6c8f5a, roughness: 0.98, metalness: 0.02 });
    const lawn = new THREE.Mesh(new THREE.PlaneGeometry(120, 92), grassMat);
    lawn.rotation.x = -Math.PI / 2;
    lawn.position.set(10, 0.02, 14);
    lawn.receiveShadow = true;
    scene.add(lawn);

    const pathMat = new THREE.MeshStandardMaterial({ color: 0xc9b285, roughness: 1, metalness: 0 });
    const path = new THREE.Mesh(new THREE.PlaneGeometry(12, 42), pathMat);
    path.rotation.x = -Math.PI / 2;
    path.position.set(-9, 0.03, 30);
    path.receiveShadow = true;
    scene.add(path);

    const walkwayTiles = new THREE.Group();
    for (let i = 0; i < 6; i++) {
        const tile = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.3, 4.5), pathMat);
        tile.position.set(-9, 0.15, 40 - i * 7);
        tile.castShadow = true;
        walkwayTiles.add(tile);
    }
    scene.add(walkwayTiles);

    const woodMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.65, metalness: 0.05 });
    const sidingMat = new THREE.MeshStandardMaterial({ color: 0xeceded, roughness: 0.82, metalness: 0.04 });
    const stoneMat = new THREE.MeshStandardMaterial({ color: 0x2f3438, roughness: 0.92, metalness: 0.05 });
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x242b33, roughness: 0.85, metalness: 0.12 });
    const glassMat = new THREE.MeshPhysicalMaterial({ color: 0x95c7e4, roughness: 0.12, metalness: 0.25, transparent: true, opacity: 0.48, transmission: 0.65, clearcoat: 0.2 });
    const trimMat = new THREE.MeshStandardMaterial({ color: 0x28323c, roughness: 0.9, metalness: 0.1 });

    const house = new THREE.Group();

    const baseVolume = new THREE.Mesh(new THREE.BoxGeometry(width, floorHeight * 1.1, depth * 0.92), sidingMat);
    baseVolume.position.set(0, floorHeight * 0.55, 0);
    baseVolume.castShadow = true;
    baseVolume.receiveShadow = true;
    house.add(baseVolume);

    const secondVolume = new THREE.Mesh(new THREE.BoxGeometry(width * 0.88, floorHeight * 0.95, depth * 0.78), sidingMat);
    secondVolume.position.set(0, floorHeight * 1.3 + 1.0, -4);
    secondVolume.castShadow = true;
    secondVolume.receiveShadow = true;
    house.add(secondVolume);

    const topVolume = new THREE.Mesh(new THREE.BoxGeometry(width * 0.66, floorHeight * 0.8, depth * 0.52), sidingMat);
    topVolume.position.set(11.5, floorHeight * 2.45 + 1.2, -8);
    topVolume.castShadow = true;
    topVolume.receiveShadow = true;
    house.add(topVolume);

    const stoneFeature = new THREE.Mesh(new THREE.BoxGeometry(14, floorHeight * 1.8, 7), stoneMat);
    stoneFeature.position.set(-18, floorHeight * 0.9, 18);
    stoneFeature.castShadow = true;
    stoneFeature.receiveShadow = true;
    house.add(stoneFeature);

    const garage = new THREE.Mesh(new THREE.BoxGeometry(16, floorHeight * 1.1, 18), darkMat);
    garage.position.set(22, floorHeight * 0.55, 20);
    garage.castShadow = true;
    garage.receiveShadow = true;
    house.add(garage);

    const garageDoor = new THREE.Mesh(new THREE.BoxGeometry(14, 8.5, 0.7), new THREE.MeshStandardMaterial({ color: 0xe1e1e1, roughness: 0.82, metalness: 0.05 }));
    garageDoor.position.set(22, 4.4, 29.8);
    garageDoor.castShadow = true;
    house.add(garageDoor);

    const porchRoof = new THREE.Mesh(new THREE.BoxGeometry(24, 0.6, 14), darkMat);
    porchRoof.position.set(-4.5, floorHeight * 0.95, 25);
    porchRoof.castShadow = true;
    house.add(porchRoof);

    for (let i = 0; i < 4; i++) {
        const pillar = new THREE.Mesh(new THREE.BoxGeometry(0.8, floorHeight * 0.98, 0.8), trimMat);
        pillar.position.set(-15 + i * 5.2, floorHeight * 0.48, 31);
        pillar.castShadow = true;
        house.add(pillar);
    }

    const frontDoor = new THREE.Mesh(new THREE.BoxGeometry(4, 8, 0.5), darkMat);
    frontDoor.position.set(-6, 3.9, 33.3);
    frontDoor.castShadow = true;
    house.add(frontDoor);

    const doorPanel = new THREE.Mesh(new THREE.BoxGeometry(2.2, 7.2, 0.15), woodMat);
    doorPanel.position.set(-6, 3.9, 33.05);
    house.add(doorPanel);

    const doorGlass = new THREE.Mesh(new THREE.BoxGeometry(1.1, 4.8, 0.12), glassMat);
    doorGlass.position.set(-6, 3.9, 32.9);
    house.add(doorGlass);

    function addGlazing(width, height, depth, x, y, z, rotationY = 0) {
        const frame = new THREE.Mesh(new THREE.BoxGeometry(width + 0.3, height + 0.3, depth + 0.12), trimMat);
        frame.position.set(x, y, z);
        frame.rotation.y = rotationY;
        house.add(frame);

        const glass = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), glassMat);
        glass.position.set(x, y, z + (depth > 0 ? 0.06 : 0));
        glass.rotation.y = rotationY;
        glass.castShadow = true;
        house.add(glass);
    }

    addGlazing(16, 8, 0.4, -6, 13.5, -23.5);
    addGlazing(8, 6, 0.4, 14, 16.5, -22.5);
    addGlazing(10, 6, 0.4, 26, 16.5, 12, Math.PI / 2);
    addGlazing(7, 5.5, 0.4, -17, 15.5, 10, Math.PI / 2);

    const mullionMat = new THREE.MeshStandardMaterial({ color: 0x28323c, roughness: 0.8, metalness: 0.2 });
    function addMullions(x, y, z, count, length, orientation) {
        for (let i = 0; i < count; i++) {
            const bar = new THREE.Mesh(new THREE.BoxGeometry(orientation === 'x' ? length : 0.12, orientation === 'y' ? length : 0.12, 0.12), mullionMat);
            bar.position.set(
                x + (orientation === 'x' ? -length / 2 + i * (length / count) : 0),
                y,
                z + (orientation === 'z' ? -length / 2 + i * (length / count) : 0)
            );
            house.add(bar);
        }
    }

    addMullions(-6, 13.5, -23.3, 4, 16, 'x');
    addMullions(-6, 13.5, -23.3, 3, 8, 'z');

    const roofGroup = new THREE.Group();
    const roofLeft = new THREE.Mesh(new THREE.BoxGeometry(width * 0.82, 0.8, depth * 0.6), darkMat);
    roofLeft.position.set(4, floorHeight * 3.7 + 0.35, -7.5);
    roofLeft.rotation.x = -0.22;
    roofLeft.castShadow = true;
    roofGroup.add(roofLeft);

    const roofRight = new THREE.Mesh(new THREE.BoxGeometry(width * 0.82, 0.8, depth * 0.6), darkMat);
    roofRight.position.set(4, floorHeight * 3.7 + 0.35, 4);
    roofRight.rotation.x = 0.22;
    roofRight.castShadow = true;
    roofGroup.add(roofRight);

    const roofCap = new THREE.Mesh(new THREE.BoxGeometry(width * 0.5, 0.8, 1.2), darkMat);
    roofCap.position.set(4, floorHeight * 3.95, -2.2);
    roofCap.castShadow = true;
    roofGroup.add(roofCap);
    house.add(roofGroup);

    const planterBase = new THREE.Mesh(new THREE.BoxGeometry(12, 1.6, 4.5), stoneMat);
    planterBase.position.set(-18, 1.1, -20);
    planterBase.castShadow = true;
    house.add(planterBase);

    const planterGreen = new THREE.Mesh(new THREE.BoxGeometry(11.2, 1.2, 3.8), grassMat);
    planterGreen.position.set(-18, 1.6, -20);
    house.add(planterGreen);

    const treeGroup = new THREE.Group();
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 5, 12), woodMat);
    trunk.position.set(40, 2.5, -10);
    trunk.castShadow = true;
    treeGroup.add(trunk);
    const foliage = new THREE.Mesh(new THREE.SphereGeometry(5.2, 16, 16), new THREE.MeshStandardMaterial({ color: 0x4c7d45, roughness: 0.8, metalness: 0.05 }));
    foliage.position.set(40, 8, -10);
    foliage.castShadow = true;
    treeGroup.add(foliage);
    scene.add(treeGroup);

    house.position.y = 0;
    scene.add(house);

    const grid = new THREE.GridHelper(320, 32, 0x20364a, 0x2c4b61);
    grid.position.y = 0.01;
    scene.add(grid);

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
